<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TitanBot — Server Config</title>
    <link rel="stylesheet" href="/dashboard/assets/css/style.css">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">⚡</div>
            <div><h2>KJ'S CUSTOMS</h2><span>Dashboard</span></div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Navigation</div>
            <button class="nav-item active" onclick="location.href='/dashboard'">
                <span class="icon">🏠</span> All Servers
            </button>
            <div class="nav-label" id="nav-guild-label" style="display:none">Server</div>
            <button class="nav-item" id="nav-config-btn" style="display:none" onclick="location.href=window.location.pathname">
                <span class="icon">⚙️</span> Configuration
            </button>
            <button class="nav-item" id="nav-apps-btn" style="display:none" onclick="goToApps()">
                <span class="icon">📋</span> Applications
            </button>
        </nav>
        <div class="sidebar-footer">
            <div class="user-chip">
                <img id="user-avatar" src="" alt="">
                <span class="name" id="user-name">…</span>
                <form action="/auth/logout" method="POST" style="margin:0">
                    <button class="logout" type="submit" title="Logout">✕</button>
                </form>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <button class="back" onclick="location.href='/dashboard'" title="Back">←</button>
            <span id="guild-icon-el"></span>
            <h1 id="guild-name">Loading…</h1>
        </div>

        <div class="pill-tabs" id="pill-tabs" style="display:none">
            <button class="pill-tab active" id="tab-btn-general" onclick="showTab('general')">⚙️ General</button>
            <button class="pill-tab" id="tab-btn-welcome" onclick="showTab('welcome')">👋 Welcome</button>
            <button class="pill-tab" id="tab-btn-tickets" onclick="showTab('tickets')">🎫 Tickets</button>
            <button class="pill-tab" id="tab-btn-logging" onclick="showTab('logging')">📝 Logging</button>
            <button class="pill-tab" id="tab-btn-leveling" onclick="showTab('leveling')">⭐ Leveling</button>
            <button class="pill-tab" id="tab-btn-birthdays" onclick="showTab('birthdays')">🎂 Birthdays</button>
            <button class="pill-tab" id="tab-btn-verification" onclick="showTab('verification')">✅ Verification</button>
        </div>

        <div class="content" id="content">
            <div class="loading-overlay">
                <div class="spinner"></div>
                <span>Loading server settings…</span>
            </div>
        </div>

        <div class="save-bar" id="save-bar" style="display:none">
            <span class="save-status" id="save-status"></span>
            <div style="display:flex;gap:10px">
                <button class="btn btn-ghost btn-sm" onclick="discardChanges()">Discard</button>
                <button class="btn btn-primary btn-sm" id="save-btn" onclick="saveConfig()">Save Changes</button>
            </div>
        </div>
    </main>
</div>

<div class="toast-container" id="toasts"></div>
<script src="/dashboard/assets/js/app.js"></script>
<script>
const guildId = location.pathname.split('/').pop();
let guildData = null;
let config = null;
let originalConfig = null;
let currentTab = 'general';
let dirty = false;

async function init() {
    const [user, guild, cfg] = await Promise.all([
        api('/api/me'),
        api(`/api/guilds/${guildId}`),
        api(`/api/guilds/${guildId}/config`),
    ]);

    if (!guild || !cfg) return;

    guildData = guild;
    config = deepCopy(cfg);
    originalConfig = deepCopy(cfg);

    // User chip
    if (user) {
        document.getElementById('user-name').textContent = user.username;
        const av = document.getElementById('user-avatar');
        av.src = user.avatar
            ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=64`
            : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.id) % 5}.png`;
    }

    // Guild header
    document.title = `TitanBot — ${guild.name}`;
    document.getElementById('guild-name').textContent = guild.name;
    const iconEl = document.getElementById('guild-icon-el');
    if (guild.icon) {
        iconEl.innerHTML = `<img class="guild-icon" src="${guild.icon}" alt="">`;
    } else {
        iconEl.innerHTML = `<span class="guild-icon-placeholder">${guild.name.charAt(0)}</span>`;
    }

    document.getElementById('pill-tabs').style.display = 'flex';
    document.getElementById('nav-guild-label').style.display = '';
    document.getElementById('nav-config-btn').style.display = '';
    document.getElementById('nav-apps-btn').style.display = '';
    showTab('general');
}

function goToApps() {
    location.href = `/dashboard/guild/${guildId}/applications`;
}

function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.pill-tab').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-btn-${tab}`)?.classList.add('active');
    renderTab(tab);
}

function renderTab(tab) {
    const content = document.getElementById('content');
    if (!guildData || !config) return;

    const textChannels = guildData.channels.filter(c => c.type === 0 || c.type === 5);
    const categories = guildData.channels.filter(c => c.type === 4);
    const roles = guildData.roles;

    const selCh = (val) => buildSelect(textChannels, val, 'None / Not set');
    const selCat = (val) => buildSelect(categories, val, 'None / Not set');
    const selRole = (val) => buildSelect(roles, val, 'None / Not set');

    if (tab === 'general') {
        content.innerHTML = `
        <div class="card">
            <div class="card-header">
                <div><h2>⚙️ General Settings</h2><p>Basic bot configuration for this server.</p></div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Bot Prefix <span class="label-hint">for text commands</span></label>
                    <input type="text" id="cfg-prefix" value="${escHtml(config.prefix || '!')}" maxlength="5" oninput="setDirty()">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Moderator Role</label>
                    <select id="cfg-modRole" onchange="setDirty()">${selRole(config.modRole)}</select>
                </div>
                <div class="form-group">
                    <label>Admin Role</label>
                    <select id="cfg-adminRole" onchange="setDirty()">${selRole(config.adminRole)}</select>
                </div>
            </div>
        </div>`;
    }

    else if (tab === 'welcome') {
        content.innerHTML = `
        <div class="card">
            <div class="card-header">
                <div><h2>👋 Welcome Settings</h2><p>Greet new members and assign roles automatically.</p></div>
            </div>
            <div class="form-group">
                <label>Welcome Channel</label>
                <select id="cfg-welcomeChannel" onchange="setDirty()">${selCh(config.welcomeChannel)}</select>
            </div>
            <div class="form-group">
                <label>Welcome Message <span class="label-hint">use {user} and {server}</span></label>
                <textarea id="cfg-welcomeMessage" rows="3" oninput="setDirty()">${escHtml(config.welcomeMessage || 'Welcome {user} to {server}!')}</textarea>
            </div>
            <div class="form-group">
                <label>Auto Role <span class="label-hint">assigned when someone joins</span></label>
                <select id="cfg-autoRole" onchange="setDirty()">${selRole(config.autoRole)}</select>
            </div>
        </div>`;
    }

    else if (tab === 'tickets') {
        const dmEnabled = config.dmOnClose !== false;
        content.innerHTML = `
        <div class="card">
            <div class="card-header">
                <div><h2>🎫 Ticket System</h2><p>Configure how the ticket system works in this server.</p></div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Panel Channel</label>
                    <select id="cfg-ticketPanelChannelId" onchange="setDirty()">${selCh(config.ticketPanelChannelId)}</select>
                </div>
                <div class="form-group">
                    <label>Staff Role</label>
                    <select id="cfg-ticketStaffRoleId" onchange="setDirty()">${selRole(config.ticketStaffRoleId)}</select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Open Tickets Category</label>
                    <select id="cfg-ticketCategoryId" onchange="setDirty()">${selCat(config.ticketCategoryId)}</select>
                </div>
                <div class="form-group">
                    <label>Closed Tickets Category</label>
                    <select id="cfg-ticketClosedCategoryId" onchange="setDirty()">${selCat(config.ticketClosedCategoryId)}</select>
                </div>
            </div>
            <div class="form-group">
                <label>Panel Message</label>
                <textarea id="cfg-ticketPanelMessage" rows="3" oninput="setDirty()">${escHtml(config.ticketPanelMessage || 'Click the button below to create a support ticket.')}</textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Button Label</label>
                    <input type="text" id="cfg-ticketButtonLabel" value="${escHtml(config.ticketButtonLabel || 'Create Ticket')}" maxlength="80" oninput="setDirty()">
                </div>
                <div class="form-group">
                    <label>Max Tickets Per User</label>
                    <input type="number" id="cfg-maxTicketsPerUser" value="${config.maxTicketsPerUser || 3}" min="1" max="10" oninput="setDirty()">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Ticket Logs Channel</label>
                    <select id="cfg-ticketLogsChannelId" onchange="setDirty()">${selCh(config.ticketLogsChannelId)}</select>
                </div>
                <div class="form-group">
                    <label>Transcript Channel</label>
                    <select id="cfg-ticketTranscriptChannelId" onchange="setDirty()">${selCh(config.ticketTranscriptChannelId)}</select>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header"><div><h2>🔧 Ticket Options</h2></div></div>
            <div class="toggle-row">
                <div class="toggle-info">
                    <h3>DM on Close</h3>
                    <p>Send users a DM when their ticket is closed.</p>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="cfg-dmOnClose" ${dmEnabled ? 'checked' : ''} onchange="setDirty()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>`;
    }

    else if (tab === 'logging') {
        const logging = config.logging || {};
        const ch = logging.channels || {};
        content.innerHTML = `
        <div class="card">
            <div class="card-header"><div><h2>📝 Logging</h2><p>Track server events to audit channels.</p></div></div>
            <div class="toggle-row">
                <div class="toggle-info">
                    <h3>Enable Logging</h3>
                    <p>Turn on audit logging for this server.</p>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="cfg-logging-enabled" ${logging.enabled ? 'checked' : ''} onchange="setDirty()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
        <div class="card">
            <div class="card-header"><div><h2>📡 Log Channels</h2><p>Where different types of logs are sent.</p></div></div>
            <div class="form-group">
                <label>Audit Log Channel</label>
                <select id="cfg-logging-audit" onchange="setDirty()">${selCh(ch.audit)}</select>
            </div>
            <div class="form-group">
                <label>Applications Channel</label>
                <select id="cfg-logging-applications" onchange="setDirty()">${selCh(ch.applications)}</select>
            </div>
            <div class="form-group">
                <label>Reports Channel</label>
                <select id="cfg-logging-reports" onchange="setDirty()">${selCh(ch.reports)}</select>
            </div>
        </div>`;
    }

    else if (tab === 'leveling') {
        const lv = config.leveling || {};
        const xp = lv.xpPerMessage || {};
        content.innerHTML = `
        <div class="card">
            <div class="card-header"><div><h2>⭐ Leveling System</h2><p>Configure XP and level-up behaviour.</p></div></div>
            <div class="toggle-row">
                <div class="toggle-info"><h3>Enable Leveling</h3><p>Award XP to members for chatting.</p></div>
                <label class="toggle">
                    <input type="checkbox" id="cfg-lv-enabled" ${lv.enabled ? 'checked' : ''} onchange="setDirty()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <div class="toggle-info"><h3>Announce Level-Ups</h3><p>Post a message when someone levels up.</p></div>
                <label class="toggle">
                    <input type="checkbox" id="cfg-lv-announce" ${lv.announceLevelUp !== false ? 'checked' : ''} onchange="setDirty()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
        <div class="card">
            <div class="card-header"><div><h2>📊 XP Settings</h2><p>Control how much XP members earn.</p></div></div>
            <div class="form-row">
                <div class="form-group">
                    <label>Min XP Per Message <span class="label-hint">1–500</span></label>
                    <input type="number" id="cfg-lv-xp-min" value="${xp.min ?? 15}" min="1" max="500" oninput="setDirty()">
                </div>
                <div class="form-group">
                    <label>Max XP Per Message <span class="label-hint">1–500</span></label>
                    <input type="number" id="cfg-lv-xp-max" value="${xp.max ?? 25}" min="1" max="500" oninput="setDirty()">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>XP Cooldown <span class="label-hint">seconds between XP grants</span></label>
                    <input type="number" id="cfg-lv-cooldown" value="${lv.xpCooldown ?? 60}" min="0" max="3600" oninput="setDirty()">
                </div>
                <div class="form-group">
                    <label>XP Multiplier</label>
                    <input type="number" id="cfg-lv-multiplier" value="${lv.xpMultiplier ?? 1}" min="0.1" max="10" step="0.1" oninput="setDirty()">
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header"><div><h2>📣 Level-Up Announcements</h2></div></div>
            <div class="form-group">
                <label>Level-Up Channel <span class="label-hint">leave empty to post in same channel</span></label>
                <select id="cfg-lv-channel" onchange="setDirty()">${selCh(lv.levelUpChannel)}</select>
            </div>
            <div class="form-group">
                <label>Level-Up Message <span class="label-hint">{user} and {level} available</span></label>
                <textarea id="cfg-lv-message" rows="2" oninput="setDirty()">${escHtml(lv.levelUpMessage || 'Congratulations {user}, you reached level {level}!')}</textarea>
            </div>
        </div>`;
    }

    else if (tab === 'birthdays') {
        content.innerHTML = `
        <div class="card">
            <div class="card-header"><div><h2>🎂 Birthday Settings</h2><p>Celebrate member birthdays automatically.</p></div></div>
            <div class="form-group">
                <label>Birthday Announcement Channel</label>
                <select id="cfg-bday-channel" onchange="setDirty()">${selCh(config.birthdayChannelId)}</select>
            </div>
            <div class="form-group">
                <label>Birthday Role <span class="label-hint">assigned on their birthday</span></label>
                <select id="cfg-bday-role" onchange="setDirty()">${selRole(config.birthdayRoleId)}</select>
            </div>
        </div>`;
    }

    else if (tab === 'verification') {
        const v = config.verification || {};
        const av = v.autoVerify || {};
        content.innerHTML = `
        <div class="card">
            <div class="card-header"><div><h2>✅ Verification System</h2><p>Require members to verify before accessing the server.</p></div></div>
            <div class="toggle-row">
                <div class="toggle-info"><h3>Enable Verification</h3><p>Show a verification panel new members must complete.</p></div>
                <label class="toggle">
                    <input type="checkbox" id="cfg-v-enabled" ${v.enabled ? 'checked' : ''} onchange="setDirty()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="form-row" style="margin-top:16px">
                <div class="form-group">
                    <label>Verification Channel</label>
                    <select id="cfg-v-channel" onchange="setDirty()">${selCh(v.channelId)}</select>
                </div>
                <div class="form-group">
                    <label>Verified Role</label>
                    <select id="cfg-v-role" onchange="setDirty()">${selRole(v.roleId)}</select>
                </div>
            </div>
            <div class="form-group">
                <label>Verification Message</label>
                <textarea id="cfg-v-message" rows="3" oninput="setDirty()">${escHtml(v.message || 'Click the button below to verify and access the server.')}</textarea>
            </div>
            <div class="form-group">
                <label>Button Text</label>
                <input type="text" id="cfg-v-button" value="${escHtml(v.buttonText || 'Verify')}" maxlength="80" oninput="setDirty()">
            </div>
        </div>
        <div class="card">
            <div class="card-header"><div><h2>🤖 Auto-Verify</h2><p>Automatically verify members who meet certain criteria.</p></div></div>
            <div class="toggle-row">
                <div class="toggle-info"><h3>Enable Auto-Verify</h3><p>Automatically verify members without button click.</p></div>
                <label class="toggle">
                    <input type="checkbox" id="cfg-av-enabled" ${av.enabled ? 'checked' : ''} onchange="setDirty()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="form-group" style="margin-top:16px">
                <label>Criteria</label>
                <select id="cfg-av-criteria" onchange="setDirty()">
                    <option value="none" ${(av.criteria||'none')==='none'?'selected':''}>None</option>
                    <option value="account_age" ${av.criteria==='account_age'?'selected':''}>Account Age</option>
                    <option value="server_size" ${av.criteria==='server_size'?'selected':''}>Server Size</option>
                </select>
            </div>
            <div class="form-group">
                <label>Min Account Age <span class="label-hint">days (used when criteria = Account Age)</span></label>
                <input type="number" id="cfg-av-age" value="${av.accountAgeDays ?? 7}" min="1" max="365" oninput="setDirty()">
            </div>
        </div>`;
    }

    document.getElementById('save-bar').style.display = dirty ? 'flex' : 'none';
}

function collectConfig() {
    const get = (id) => {
        const el = document.getElementById(id);
        if (!el) return undefined;
        if (el.type === 'checkbox') return el.checked;
        return el.value || null;
    };

    if (currentTab === 'general') {
        return {
            prefix: get('cfg-prefix') || '!',
            modRole: get('cfg-modRole'),
            adminRole: get('cfg-adminRole'),
        };
    }
    if (currentTab === 'welcome') {
        return {
            welcomeChannel: get('cfg-welcomeChannel'),
            welcomeMessage: get('cfg-welcomeMessage') || 'Welcome {user} to {server}!',
            autoRole: get('cfg-autoRole'),
        };
    }
    if (currentTab === 'tickets') {
        const max = parseInt(document.getElementById('cfg-maxTicketsPerUser')?.value || '3');
        return {
            ticketPanelChannelId: get('cfg-ticketPanelChannelId'),
            ticketStaffRoleId: get('cfg-ticketStaffRoleId'),
            ticketCategoryId: get('cfg-ticketCategoryId'),
            ticketClosedCategoryId: get('cfg-ticketClosedCategoryId'),
            ticketPanelMessage: get('cfg-ticketPanelMessage') || 'Click the button below to create a support ticket.',
            ticketButtonLabel: get('cfg-ticketButtonLabel') || 'Create Ticket',
            maxTicketsPerUser: isNaN(max) ? 3 : Math.min(10, Math.max(1, max)),
            ticketLogsChannelId: get('cfg-ticketLogsChannelId'),
            ticketTranscriptChannelId: get('cfg-ticketTranscriptChannelId'),
            dmOnClose: get('cfg-dmOnClose'),
        };
    }
    if (currentTab === 'logging') {
        return {
            logging: {
                ...((config.logging) || {}),
                enabled: get('cfg-logging-enabled'),
                channels: {
                    audit: get('cfg-logging-audit'),
                    applications: get('cfg-logging-applications'),
                    reports: get('cfg-logging-reports'),
                },
            },
        };
    }
    if (currentTab === 'leveling') {
        const min = parseInt(document.getElementById('cfg-lv-xp-min')?.value || '15');
        const max = parseInt(document.getElementById('cfg-lv-xp-max')?.value || '25');
        const cooldown = parseInt(document.getElementById('cfg-lv-cooldown')?.value || '60');
        const multiplier = parseFloat(document.getElementById('cfg-lv-multiplier')?.value || '1');
        return {
            leveling: {
                ...((config.leveling) || {}),
                enabled: get('cfg-lv-enabled'),
                announceLevelUp: get('cfg-lv-announce'),
                xpPerMessage: { min: Math.min(min, max), max: Math.max(min, max) },
                xpCooldown: isNaN(cooldown) ? 60 : Math.min(3600, Math.max(0, cooldown)),
                xpMultiplier: isNaN(multiplier) ? 1 : Math.min(10, Math.max(0.1, multiplier)),
                levelUpChannel: get('cfg-lv-channel'),
                levelUpMessage: get('cfg-lv-message') || 'Congratulations {user}, you reached level {level}!',
            },
        };
    }
    if (currentTab === 'birthdays') {
        return {
            birthdayChannelId: get('cfg-bday-channel'),
            birthdayRoleId: get('cfg-bday-role'),
        };
    }
    if (currentTab === 'verification') {
        const age = parseInt(document.getElementById('cfg-av-age')?.value || '7');
        return {
            verification: {
                ...((config.verification) || {}),
                enabled: get('cfg-v-enabled'),
                channelId: get('cfg-v-channel'),
                roleId: get('cfg-v-role'),
                message: get('cfg-v-message') || 'Click the button below to verify and access the server.',
                buttonText: get('cfg-v-button') || 'Verify',
                autoVerify: {
                    enabled: get('cfg-av-enabled'),
                    criteria: get('cfg-av-criteria') || 'none',
                    accountAgeDays: isNaN(age) ? 7 : Math.min(365, Math.max(1, age)),
                },
            },
        };
    }
    return {};
}

async function saveConfig() {
    const btn = document.getElementById('save-btn');
    const status = document.getElementById('save-status');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    status.textContent = '';
    status.className = 'save-status';

    const updates = collectConfig();
    const result = await api(`/api/guilds/${guildId}/config`, { method: 'PATCH', body: updates });

    btn.disabled = false;
    btn.textContent = 'Save Changes';

    if (result) {
        config = deepCopy(result);
        originalConfig = deepCopy(result);
        dirty = false;
        document.getElementById('save-bar').style.display = 'none';
        toast('Settings saved!', 'success');
    }
}

function discardChanges() {
    config = deepCopy(originalConfig);
    dirty = false;
    renderTab(currentTab);
}

function setDirty() {
    dirty = true;
    document.getElementById('save-bar').style.display = 'flex';
}

function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

init();
</script>
</body>
</html>
